<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million Checkboxes - Konoha Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c9/Naruto_logo.svg" alt="Naruto Logo" height="30">
            <h1>1 Million Jutsu(checbox) - Kakashi Hatake</h1>
        </div>
        <div class="user-info">
            <div id="auth-status" class="auth-status">Loading chakra...</div>
            <button id="login-btn" class="btn hidden">Login with Konoha</button>
            <a id="logout-btn" href="/auth/logout" class="btn btn-outline hidden">Release Chakra (Logout)</a>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat">Checked: <span id="checked-count">0</span> / 1,000,000</div>
        <div id="toast" class="toast hidden"></div>
    </div>

    <main class="grid-container" id="scroll-container">
        <!-- Virtual container forces the scrollbars to match 1000 * 20px = 20000px -->
        <div class="virtual-space" id="virtual-space"></div>
        <canvas id="checkbox-canvas"></canvas>
    </main>

    <script src="app.js"></script>
</body>
</html>
